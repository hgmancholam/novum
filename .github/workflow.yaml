# Agentic Workflow — Novum Development
# This YAML defines the orchestrated development workflow for all agents.
# Compatible with GitHub Copilot (VS Code) and Claude Code.

workflow:
  name: "Novum Agentic Development Workflow"
  version: "1.1.0"
  description: >
    Orchestrated workflow for requirement analysis, implementation,
    code review, and quality assurance. Adaptive depth via complexity
    triage (S/M/L); minimum review score 8-9/10 depending on profile,
    with max 5 code-review iterations.

# =============================================================================
# COMPLEXITY TRIAGE (mandatory pre-flight gate, runs on EVERY new request)
# =============================================================================
# Triage is NOT bound to F1. It runs as a pre-flight gate before whatever
# phase the user requests as entry point:
#   - "Analyze requirement X"     → triage → F1
#   - "Plan US-XX"                → triage → F2
#   - "Implement PLAN-US-XX"      → triage → F3
#   - "Review PR / branch"        → triage → F4
#   - "Continue iteration on US"  → triage → resume at last phase
#
# The Orchestrator MUST classify every incoming request as S | M | L BEFORE
# delegating to any subagent. Classification is recorded in the decisions log
# and drives:
#   - which phases run (BSA / Auditor can be skipped on S)
#   - per-phase iteration caps and score thresholds (quality_profiles)
#   - which model is used for each subagent invocation (model_routing)
#
# If the request straddles two levels → pick the HIGHER level (fail-safe).
# Mid-flow re-classification (upward only) is allowed when:
#   - Coder exceeds LOC estimate by > 50%, OR
#   - Reviewer scores < 7 on the first pass.
# On re-classification, gates skipped by the previous profile MUST be
# re-enabled and re-run on the artifacts produced so far.
#
# If the user explicitly overrides the level (e.g. "force complexity=L"),
# honor the override and log it as `triage.override_reason`.
# =============================================================================
complexity_triage:
  run_on: "every_new_request"      # not only at F0 — also when entering F2/F3/F4 directly
  applies_to_entry_phases: ["F1", "F2", "F3", "F4"]
  user_override: allowed
  levels:
    S:
      name: "Simple"
      signals:
        - "CRUD over an existing table"
        - "Bugfix / refactor / copy change / dependency bump"
        - "New endpoint without migration"
        - "0-1 new RFs touched"
        - "≤ 6 files modified"
        - "0 new architectural decisions"
    M:
      name: "Medium"
      signals:
        - "New feature inside an existing seam (Source / StoppingSignal / OutputRenderer)"
        - "Trivial migration (additive column, new table without FK web)"
        - "Touches FE + BE atomically"
        - "1-2 new RFs touched"
        - "7-15 files modified"
        - "≤ 1 new architectural decision"
    L:
      name: "Complex"
      signals:
        - "New seam, new external service, new FSM"
        - "Event-schema contract change"
        - "Resolves a pending decision from docs/technical-phase/tech-stack.md"
        - "≥ 2 new RFs touched"
        - "> 15 files modified or cross-cutting refactor"
        - "≥ 2 architectural decisions"

# =============================================================================
# QUALITY PROFILES (parameterized gates, indexed by complexity level)
# =============================================================================
# Agents MUST read the active profile (set by the Orchestrator after triage)
# and honor its thresholds. Tests, lint and typecheck are NEVER skipped — they
# are the real correctness floor; profiles only tune document-level rigor.
# =============================================================================
quality_profiles:
  S:
    audit_f1:        { enabled: false }                       # BSA → no Auditor
    audit_f2:        { enabled: false }                       # Orchestrator → no Auditor
    bsa:             { enabled: false }                       # Orchestrator inlines a mini-BRD (≤ 30 lines)
    review:          { min_score: 8, max_iter: 2 }
    plan_format:     "checklist"
    test_coverage:   { backend: 80, frontend: 80 }
  M:
    audit_f1:        { enabled: true,  min_score: 8, max_iter: 1 }
    audit_f2:        { enabled: true,  min_score: 8, max_iter: 1 }
    bsa:             { enabled: true }
    review:          { min_score: 9, max_iter: 3 }
    plan_format:     "standard"
    test_coverage:   { backend: 80, frontend: 80 }
  L:
    audit_f1:        { enabled: true,  min_score: 9, max_iter: 3 }  # legacy behavior
    audit_f2:        { enabled: true,  min_score: 9, max_iter: 3 }
    bsa:             { enabled: true }
    review:          { min_score: 9, max_iter: 5 }
    plan_format:     "full"
    test_coverage:   { backend: 80, frontend: 80 }

# =============================================================================
# MODEL ROUTING (passed to runSubagent via the `model` parameter)
# =============================================================================
# Format MUST match the model picker string exactly, including "(copilot)".
# Confirm names against the VS Code model selector before first use; adjust
# here if your tenant exposes different identifiers.
#
# Escalation rule: if a subagent returns score < threshold OR asks for
# clarification, re-invoke with the next tier UP (fast → balanced → deep)
# before escalating to F6.
# =============================================================================
model_routing:
  tiers:
    fast:     "Claude Haiku 4.5 (copilot)"
    balanced: "Claude Sonnet 4.5 (copilot)"
    deep:     "Claude Opus 4.7 (copilot)"
  matrix:
    # Read-only exploration: always cheap
    Explore:  { S: fast,     M: fast,     L: fast }
    # Analysis & audit: scale rigor with complexity
    BSA:      { S: skipped,  M: fast,     L: balanced }
    Auditor:  { S: skipped,  M: fast,     L: balanced }
    # Implementation: always balanced minimum (writes production code)
    Coder:    { S: balanced, M: balanced, L: balanced }
    # Review: cheap for trivial changes, deep for cross-cutting refactors
    Reviewer: { S: fast,     M: balanced, L: balanced }
    # Eval gate: balanced+ — statistical reasoning + failure taxonomy
    EvalEngineer: { S: skipped, M: balanced, L: balanced }

# =============================================================================
# AGENTS
# =============================================================================
agents:
  orchestrator:
    name: "Orchestrator"
    role: "Workflow controller and task coordinator"
    responsibilities:
      - Receive and parse incoming requirements
      - Delegate tasks to appropriate agents
      - Monitor iteration cycles (max 5)
      - Enforce quality gates (score ≥ 9/10)
      - Escalate to manual review when needed
    entry_point: true
    memory_protocol: mandatory

  bsa:
    name: "BSA (Business Systems Analyst)"
    role: "Requirements analysis and documentation"
    responsibilities:
      - Analyze user requirements
      - Generate Business Requirements Documents (BRDs)
      - Create User Stories with acceptance criteria
      - Sync documentation to GitHub via MCP
    outputs:
      - docs/implementation-phase/brds/
      - docs/implementation-phase/user-stories/
    memory_protocol: mandatory

  coder:
    name: "Coder"
    role: "Implementation and test generation"
    responsibilities:
      - Implement code following best practices
      - Generate unit tests (backend + frontend)
      - Follow tech stack conventions (Python, FastAPI, React, Vite)
      - Apply architectural patterns from docs
    skills_required:
      - python-best-practices
      - react-vite-best-practices
      - llm-development
      - unit-test-backend
      - unit-test-frontend
    memory_protocol: mandatory

  reviewer:
    name: "Reviewer"
    role: "Code quality evaluation and scoring"
    responsibilities:
      - Evaluate code against quality standards
      - Assign score (1-10 scale)
      - Provide actionable feedback
      - Approve or request revisions
    scoring:
      minimum_passing_score: 9
      criteria:
        - code_quality: 25%
        - test_coverage: 20%
        - architecture_compliance: 20%
        - documentation: 15%
        - security: 10%
        - performance: 10%
    outputs:
      - docs/implementation-phase/reviews/
    memory_protocol: mandatory

  auditor:
    name: "Auditor"
    role: "Document quality auditor — validates BRDs, User Stories and Implementation Plans"
    responsibilities:
      - Audit BRDs and User Stories against RF-01..RF-16 (inside F1 sub-loop)
      - Audit Implementation Plans against parent US/BRD and RFs (inside F2 sub-loop)
      - Detect blind paths (missing transitions, unhandled errors, no user feedback)
      - Assign score (0-10 scale)
      - Return actionable feedback to producing agent on score < 9
    scoring:
      minimum_passing_score: 9
      criteria:
        - requirements_coverage: 30%
        - acceptance_criteria_completeness: 20%
        - blind_path_absence: 25%
        - traceability: 15%
        - consistency_with_authoritative_docs: 10%
    skills_required:
      - audit-brd
      - audit-user-story
      - audit-implementation-plan
    outputs:
      - docs/implementation-phase/audits/
    memory_protocol: mandatory

  eval_engineer:
    name: "EvalEngineer"
    role: "Behavioral / runtime evaluation specialist (F3.5 EVAL-GATE)"
    responsibilities:
      - Validate hypothesis pre-registration before any behavior-changing diff
      - Verify telemetry exists for every metric named in the hypothesis (P2)
      - Run eval against frozen golden set, compute 4-axis composite scorecard
      - Tag failing runs with the canonical failure taxonomy
      - VETO merges to main when behavioral regression is detected
    trigger_paths:
      - "backend/app/agent/**"
      - "backend/app/llm/**"
      - "backend/app/stopping/**"
      - "backend/app/confidence/**"
      - "backend/app/source_plugins/**"
    skills_required:
      - eval-instrumentation
    veto_authority: true                # blocks F4 → F5 on behavioral regression
    scoring:
      composite_axes: [convergence, honesty, brevity_with_substance, efficiency]
      golden_set: "docs/q-for-testing.md"
      stats: "bootstrap_ci_90 + sign_test (n=8 forces non-parametric)"
      two_cycle_confirmation: true       # single eval never locks a change
    outputs:
      - docs/evaluation/iteration-history-*.md
      - docs/evaluation/failure-taxonomy.md
      - docs/evaluation/hypotheses/IP-*.yaml
      - scripts/compare_*.py
      - eval_*.txt
      - compare_*.{txt,json}
    memory_protocol: mandatory

# =============================================================================
# SKILLS
# =============================================================================
skills:
  # GitHub Integration
  github-mcp:
    name: "GitHub MCP Integration"
    description: "Connect to GitHub for issues, PRs, and documentation sync"
    capabilities:
      - Create and update issues
      - Create pull requests
      - Push documentation
      - Comment on issues/PRs

  # Frontend Skills
  ux-frontend:
    name: "User Experience & Frontend"
    description: "UI/UX best practices, accessibility, responsive design"
    technologies:
      - React 19
      - Tailwind v4
      - shadcn/ui
      - Motion v12

  # Database Skills
  database:
    name: "Database Connection"
    description: "Query database objects, review schema, execute queries"
    capabilities:
      - Inspect PostgreSQL schema
      - Execute read queries
      - Review migrations
      - Analyze JSONB structures

  # Planning Skills
  implementation-plan:
    name: "Implementation Planning"
    description: "Generate detailed implementation plans from user stories"
    outputs:
      - Task breakdown
      - File modifications
      - Dependencies
      - Testing requirements

  # Testing Skills
  unit-test-backend:
    name: "Backend Unit Testing"
    description: "Python/pytest testing best practices"
    frameworks:
      - pytest
      - pytest-asyncio
      - pytest-httpx
      - pytest-postgresql

  unit-test-frontend:
    name: "Frontend Unit Testing"
    description: "React/Vitest testing best practices"
    frameworks:
      - Vitest
      - Testing Library
      - jest-axe
      - MSW

  # Document Audit Skills (used by Auditor)
  audit-brd:
    name: "BRD Audit"
    description: "Checklist-driven audit of Business Requirements Documents"
    location: ".github/prompts/skills/audit-brd/"

  audit-user-story:
    name: "User Story Audit"
    description: "INVEST + Gherkin checklist audit of User Stories"
    location: ".github/prompts/skills/audit-user-story/"

  audit-implementation-plan:
    name: "Implementation Plan Audit"
    description: "Blind-path detection and RF coverage audit of Implementation Plans"
    location: ".github/prompts/skills/audit-implementation-plan/"

  # Evaluation Skills (used by EvalEngineer)
  eval-instrumentation:
    name: "Eval Instrumentation"
    description: "Minimal-cost telemetry via Pydantic extra='allow' so behavioral changes become observable before being tuned (P2 — instrument before tune)"
    location: ".github/prompts/skills/eval-instrumentation/"

  # Memory Protocol
  memory-protocol:
    name: "Memory Protocol"
    description: "Shared memory bank for all agents"
    mandatory: true
    location: ".github/memory-bank/"
    operations:
      - read_before_task
      - update_after_task

# =============================================================================
# WORKFLOW PHASES (F0-F6)
# =============================================================================
# Reference IDs for phases and steps:
#   Phase: F{n}     (e.g., F0, F1, F2...)
#   Step:  F{n}.S{m} (e.g., F1.S1, F1.S2...)
#
# Quick Reference Table:
# ┌────────┬──────────────┬────────────────┬──────────────────────────────────┐
# │ Phase  │ ID           │ Agent          │ Description                      │
# ├────────┼──────────────┼────────────────┼──────────────────────────────────┤
# │ IDLE   │ F0           │ -              │ Waiting for new requirement      │
# │ TRIAGE │ F0.5         │ Orchestrator   │ Pre-flight: classify S/M/L,      │
# │        │              │                │ select profile + model routing.  │
# │        │              │                │ Runs before F1/F2/F3/F4 entry.   │
# │ ANALYZE│ F1           │ BSA + Auditor  │ Requirements analysis + audit    │
# │ PLAN   │ F2           │ Orch + Auditor │ Implementation planning + audit  │
# │ IMPLEMENT│ F3         │ Coder          │ Code implementation              │
# │ REVIEW │ F4           │ Reviewer       │ Quality evaluation               │
# │ COMPLETE│ F5          │ -              │ Approved, finalize               │
# │ ESCALATE│ F6          │ -              │ Max iterations, manual review    │
# └────────┴──────────────┴────────────────┴──────────────────────────────────┘
#
# NOTE on entry points:
#   - F0.5 TRIAGE is ALWAYS executed first, regardless of the entry phase
#     the user requests (F1, F2, F3, or F4). Triage cannot be skipped.
#   - After triage, control jumps directly to the requested entry phase
#     using the active quality profile and model routing.
#
# NOTE on internal audit sub-loops:
#   - F1 has an internal audit sub-loop (Auditor) with audit_iter_F1 (max 3).
#   - F2 has an internal audit sub-loop (Auditor) with audit_iter_F2 (max 3).
#   - These are NOT new phases — they iterate inside F1 / F2 until the audit
#     score is ≥ 9 or the per-phase cap is reached (then escalates to F6).
#   - The F3↔F4 review iteration (Reviewer, max 5) is independent.
#
# =============================================================================

phases:
  # ─────────────────────────────────────────────────────────────────────────────
  # F0: IDLE — Entry Point
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F0"
    name: "IDLE"
    description: "Waiting for new requirement"
    next: "F0.5"

  # ─────────────────────────────────────────────────────────────────────────────
  # F0.5: TRIAGE — Orchestrator (pre-flight, runs for EVERY new request)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F0.5"
    name: "TRIAGE"
    description: >
      Pre-flight gate. Runs before whichever phase the user requests as entry
      point (F1, F2, F3 or F4). Classifies the request as S/M/L, activates the
      matching quality_profile and model_routing column, and records the
      decision in the memory bank.
    agent: "orchestrator"
    steps:
      - id: "F0.5.S1"
        action: "parse_entry_request"
        description: >
          Determine the requested entry phase. Accepts: "analyze X" → F1,
          "plan US-XX" → F2, "implement PLAN-US-XX" → F3, "review branch" → F4,
          "continue US-XX" → resume at last recorded phase.
      - id: "F0.5.S2"
        action: "classify_complexity"
        description: >
          Apply complexity_triage.levels signals. Output: {level: S|M|L,
          rationale, profile, models}. Honor user-supplied override if present.
      - id: "F0.5.S3"
        action: "record_triage_decision"
        description: >
          Append the triage decision to .github/memory-bank/logs/decisions-history.md
          with the entry phase, complexity, profile snapshot and model matrix.
    next_conditions:
      - condition: "entry_phase == 'F1'"
        next: "F1"
      - condition: "entry_phase == 'F2'"
        next: "F2"
      - condition: "entry_phase == 'F3'"
        next: "F3"
      - condition: "entry_phase == 'F4'"
        next: "F4"

  # ─────────────────────────────────────────────────────────────────────────────
  # F1: ANALYZE — BSA Agent + Auditor Agent (internal audit sub-loop)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F1"
    name: "ANALYZE"
    description: "BSA analyzing requirement, Auditor validating documents"
    agents:
      primary: "bsa"
      auditor: "auditor"
    steps:
      - id: "F1.S1"
        action: "read_memory_bank"
        agent: "bsa"
        description: "Read project context, knowledge index, and lessons learned"
      - id: "F1.S2"
        action: "analyze_requirement"
        agent: "bsa"
        description: "Parse and classify the incoming requirement"
      - id: "F1.S3"
        action: "generate_brd"
        agent: "bsa"
        description: "Create Business Requirements Document"
      - id: "F1.S4"
        action: "generate_user_stories"
        agent: "bsa"
        description: "Create user stories with acceptance criteria"
      - id: "F1.S5"
        action: "audit_documents"
        agent: "auditor"
        description: "Auditor validates BRD + User Stories. Skills: audit-brd, audit-user-story."
      - id: "F1.S6"
        action: "apply_audit_feedback"
        agent: "bsa"
        description: "Conditional. Triggered if audit_score < 9 AND audit_iter_F1 < 3. Loops back to F1.S3 / F1.S4 with feedback. MUST modify the existing BRD / User Story files in place — same path, same filename. No new files per iteration."
        conditional: true
      - id: "F1.S7"
        action: "sync_to_github"
        agent: "bsa"
        description: "Sync approved documentation to GitHub (if MCP available)"
      - id: "F1.S8"
        action: "update_memory_bank"
        agent: "bsa"
        description: "Update decisions history and knowledge index"
    internal_audit_loop:
      counter: "audit_iter_F1"
      max_iterations: 3
      minimum_passing_score: 9
      transitions:
        - condition: "audit_score >= 9"
          next_step: "F1.S7"
        - condition: "audit_score < 9 AND audit_iter_F1 < 3"
          next_step: "F1.S6"
          increment: "audit_iter_F1"
        - condition: "audit_score < 9 AND audit_iter_F1 >= 3"
          next_phase: "F6"
    next: "F2"

  # ─────────────────────────────────────────────────────────────────────────────
  # F2: PLAN — Orchestrator Agent + Auditor Agent (internal audit sub-loop)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F2"
    name: "PLAN"
    description: "Orchestrator creating implementation plan, Auditor validating it"
    agents:
      primary: "orchestrator"
      auditor: "auditor"
    steps:
      - id: "F2.S1"
        action: "read_memory_bank"
        agent: "orchestrator"
        description: "Read project context and generated BRD/stories"
      - id: "F2.S2"
        action: "create_implementation_plan"
        agent: "orchestrator"
        description: "Break down user stories into tasks with effort estimates"
      - id: "F2.S3"
        action: "audit_plan"
        agent: "auditor"
        description: "Auditor validates the Implementation Plan. Skill: audit-implementation-plan."
      - id: "F2.S4"
        action: "apply_audit_feedback"
        agent: "orchestrator"
        description: "Conditional. Triggered if audit_score < 9 AND audit_iter_F2 < 3. Loops back to F2.S2 with feedback. MUST modify the existing Implementation Plan file in place — same path, same filename. No new files per iteration."
        conditional: true
      - id: "F2.S5"
        action: "update_memory_bank"
        agent: "orchestrator"
        description: "Record planning decisions and update index"
    internal_audit_loop:
      counter: "audit_iter_F2"
      max_iterations: 3
      minimum_passing_score: 9
      transitions:
        - condition: "audit_score >= 9"
          next_step: "F2.S5"
        - condition: "audit_score < 9 AND audit_iter_F2 < 3"
          next_step: "F2.S4"
          increment: "audit_iter_F2"
        - condition: "audit_score < 9 AND audit_iter_F2 >= 3"
          next_phase: "F6"
    next: "F3"

  # ─────────────────────────────────────────────────────────────────────────────
  # F3: IMPLEMENT — Coder Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F3"
    name: "IMPLEMENT"
    description: "Coder implementing solution"
    agent: "coder"
    steps:
      - id: "F3.S1"
        action: "read_memory_bank"
        description: "Read implementation plan, architecture, and conventions"
      - id: "F3.S2"
        action: "implement_code"
        description: "Write production code following tech stack standards"
      - id: "F3.S3"
        action: "generate_unit_tests"
        description: "Create unit tests for backend and/or frontend"
      - id: "F3.S4"
        action: "update_memory_bank"
        description: "Record implementation decisions and created files"
    next: "F3.5"

  # ─────────────────────────────────────────────────────────────────────────────
  # F3.5: EVAL-GATE — EvalEngineer (only when diff touches behavioral paths)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F3.5"
    name: "EVAL-GATE"
    description: >
      Behavioral / runtime gate. Runs ONLY when the diff touches one of the
      EvalEngineer trigger_paths (backend/app/agent|llm|stopping|confidence|
      source_plugins). Otherwise it's a no-op pass-through to F4.
      Validates hypothesis pre-registration, runs golden-set eval, computes
      4-axis scorecard, applies failure taxonomy, and VETOES merges on
      behavioral regression.
    agent: "eval_engineer"
    conditional: true
    skip_when: "diff does not touch backend/app/{agent,llm,stopping,confidence,source_plugins}/**"
    steps:
      - id: "F3.5.S1"
        action: "read_hypothesis_block"
        description: "Locate docs/evaluation/hypotheses/IP-XX.yaml. If missing → BLOCK and demand pre-registration from Coder/Orchestrator."
      - id: "F3.5.S2"
        action: "verify_telemetry"
        description: "Confirm every metric in the hypothesis is observable in events or compare scripts. If not → BLOCK and demand IP-XX-instr precursor diff."
      - id: "F3.5.S3"
        action: "run_eval"
        description: "Execute eval against frozen golden set (docs/q-for-testing.md). Persist eval_<tag>.txt."
      - id: "F3.5.S4"
        action: "build_scorecard"
        description: "Compute 4-axis composite (convergence, honesty, brevity-with-substance, efficiency) + bootstrap 90% CI + per-question table. Persist compare_<tag>.{txt,json}."
      - id: "F3.5.S5"
        action: "failure_taxonomy_pass"
        description: "Tag every non-judge_confirmed run with canonical category. Update docs/evaluation/failure-taxonomy.md trend tracker."
      - id: "F3.5.S6"
        action: "verdict"
        description: "PASS / FAIL / INCONCLUSIVE per hypothesis falsification rule. Append iteration-history row."
      - id: "F3.5.S7"
        action: "recommend_next"
        description: "If PASS → F4. If FAIL → revert + retry (max 2). If INCONCLUSIVE → instrument/expand golden set (max 1)."
    next_conditions:
      - condition: "verdict == 'PASS'"
        next: "F4"
      - condition: "verdict == 'FAIL' AND eval_iter < 2"
        next: "F3"
        increment: "eval_iter"
      - condition: "verdict == 'INCONCLUSIVE' AND eval_inconclusive_iter < 1"
        next: "F3.5"
        increment: "eval_inconclusive_iter"
      - condition: "(verdict == 'FAIL' AND eval_iter >= 2) OR (verdict == 'INCONCLUSIVE' AND eval_inconclusive_iter >= 1)"
        next: "F6"

  # ─────────────────────────────────────────────────────────────────────────────
  # F4: REVIEW — Reviewer Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F4"
    name: "REVIEW"
    description: "Reviewer evaluating code"
    agent: "reviewer"
    steps:
      - id: "F4.S1"
        action: "read_memory_bank"
        description: "Read implementation plan and acceptance criteria"
      - id: "F4.S2"
        action: "evaluate_code"
        description: "Review code against quality standards"
      - id: "F4.S3"
        action: "assign_score"
        description: "Calculate weighted score (1-10 scale)"
      - id: "F4.S4"
        action: "generate_review_report"
        description: "Create detailed review report with feedback"
      - id: "F4.S5"
        action: "update_memory_bank"
        description: "Record review decisions and lessons learned"
    next_conditions:
      - condition: "score >= 9"
        next: "F5"
      - condition: "score < 9 AND iteration < 5"
        next: "F3"
      - condition: "score < 9 AND iteration >= 5"
        next: "F6"

  # ─────────────────────────────────────────────────────────────────────────────
  # F5: COMPLETE — Terminal (Success)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F5"
    name: "COMPLETE"
    description: "Implementation approved"
    steps:
      - id: "F5.S1"
        action: "finalize_documentation"
        description: "Update all relevant documentation"
      - id: "F5.S2"
        action: "update_memory_bank"
        description: "Final update to decisions history"
      - id: "F5.S3"
        action: "notify_completion"
        description: "Notify user of successful completion"
    terminal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # F6: ESCALATE — Terminal (Manual Review Required)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F6"
    name: "ESCALATE"
    description: "Max iterations reached, manual review required"
    steps:
      - id: "F6.S1"
        action: "create_escalation_report"
        description: "Document all iteration attempts and blockers"
      - id: "F6.S2"
        action: "notify_manual_review"
        description: "Alert user that manual intervention is needed"
      - id: "F6.S3"
        action: "update_memory_bank"
        description: "Record escalation in lessons learned"
    terminal: true

# =============================================================================
# ITERATION CONTROL (overridden by quality_profiles when complexity is set)
# =============================================================================
iteration:
  # F3 <-> F4 code review loop (Reviewer) — UPPER BOUND across all profiles.
  # Effective cap is min(this value, quality_profiles[<level>].review.max_iter).
  max_cycles: 5
  tracking:
    counter_variable: "iteration_count"
    reset_on: "new_requirement"

# Internal audit sub-loops (Auditor) — independent from the code review loop.
audit_iteration:
  # UPPER BOUND across all profiles. Effective cap is
  # min(this value, quality_profiles[<level>].audit_fX.max_iter).
  # When quality_profiles[<level>].audit_fX.enabled is false, the sub-loop
  # does not run at all (the Auditor returns `skipped` immediately).
  max_cycles_per_phase: 3
  tracking:
    counters:
      - "audit_iter_F1"  # F1 ANALYZE — BRD + User Stories audit
      - "audit_iter_F2"  # F2 PLAN — Implementation Plan audit
    reset_on: "new_requirement"
  on_max_reached: "F6"  # Escalate to manual review

# =============================================================================
# MEMORY PROTOCOL
# =============================================================================
memory_protocol:
  mandatory_for_all_agents: true
  location: ".github/memory-bank/"
  structure:
    templates:
      - business-rules-template.md
      - decision-log-template.md
    indices:
      - knowledge-base-index.md
    logs:
      - lessons-learned.md
      - decisions-history.md
    conventions:
      - naming-conventions.md
    shared:
      - project-context.md
      - project-structure.md
      - architecture-summary.md
  operations:
    before_task:
      - read: "shared/project-context.md"
      - read: "indices/knowledge-base-index.md"
      - read: "logs/lessons-learned.md"
    after_task:
      - update: "logs/decisions-history.md"
      - update: "logs/lessons-learned.md"
      - update: "indices/knowledge-base-index.md"

# =============================================================================
# QUALITY GATES (legacy thresholds — superseded by quality_profiles when
# a complexity level is set on the active run. Kept for backwards reference
# and as defaults when triage is somehow skipped.)
# =============================================================================
quality_gates:
  review_score:
    minimum: 9
    scale: 10
  audit_score:
    minimum: 9
    scale: 10
    applies_to:
      - "F1: BRD + User Stories"
      - "F2: Implementation Plan"
  test_coverage:
    backend: 80%
    frontend: 80%
  documentation:
    required: true
    format: "markdown"
