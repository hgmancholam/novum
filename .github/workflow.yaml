# Agentic Workflow — Novum Development
# This YAML defines the orchestrated development workflow for all agents.
# Compatible with GitHub Copilot (VS Code) and Claude Code.

workflow:
  name: "Novum Agentic Development Workflow"
  version: "1.0.0"
  description: >
    Orchestrated workflow for requirement analysis, implementation, 
    code review, and quality assurance. Ensures minimum score of 9/10 
    with maximum 5 iteration cycles.

# =============================================================================
# AGENTS
# =============================================================================
agents:
  orchestrator:
    name: "Orchestrator"
    role: "Workflow controller and task coordinator"
    responsibilities:
      - Receive and parse incoming requirements
      - Delegate tasks to appropriate agents
      - Monitor iteration cycles (max 5)
      - Enforce quality gates (score ≥ 9/10)
      - Escalate to manual review when needed
    entry_point: true
    memory_protocol: mandatory

  bsa:
    name: "BSA (Business Systems Analyst)"
    role: "Requirements analysis and documentation"
    responsibilities:
      - Analyze user requirements
      - Generate Business Requirements Documents (BRDs)
      - Create User Stories with acceptance criteria
      - Sync documentation to GitHub via MCP
    outputs:
      - docs/implementation-phase/brds/
      - docs/implementation-phase/user-stories/
    memory_protocol: mandatory

  coder:
    name: "Coder"
    role: "Implementation and test generation"
    responsibilities:
      - Implement code following best practices
      - Generate unit tests (backend + frontend)
      - Follow tech stack conventions (Python, FastAPI, React, Vite)
      - Apply architectural patterns from docs
    skills_required:
      - python-best-practices
      - react-vite-best-practices
      - llm-development
      - unit-test-backend
      - unit-test-frontend
    memory_protocol: mandatory

  reviewer:
    name: "Reviewer"
    role: "Code quality evaluation and scoring"
    responsibilities:
      - Evaluate code against quality standards
      - Assign score (1-10 scale)
      - Provide actionable feedback
      - Approve or request revisions
    scoring:
      minimum_passing_score: 9
      criteria:
        - code_quality: 25%
        - test_coverage: 20%
        - architecture_compliance: 20%
        - documentation: 15%
        - security: 10%
        - performance: 10%
    outputs:
      - docs/implementation-phase/reviews/
    memory_protocol: mandatory

  auditor:
    name: "Auditor"
    role: "Document quality auditor — validates BRDs, User Stories and Implementation Plans"
    responsibilities:
      - Audit BRDs and User Stories against RF-01..RF-16 (inside F1 sub-loop)
      - Audit Implementation Plans against parent US/BRD and RFs (inside F2 sub-loop)
      - Detect blind paths (missing transitions, unhandled errors, no user feedback)
      - Assign score (0-10 scale)
      - Return actionable feedback to producing agent on score < 9
    scoring:
      minimum_passing_score: 9
      criteria:
        - requirements_coverage: 30%
        - acceptance_criteria_completeness: 20%
        - blind_path_absence: 25%
        - traceability: 15%
        - consistency_with_authoritative_docs: 10%
    skills_required:
      - audit-brd
      - audit-user-story
      - audit-implementation-plan
    outputs:
      - docs/implementation-phase/audits/
    memory_protocol: mandatory

# =============================================================================
# SKILLS
# =============================================================================
skills:
  # GitHub Integration
  github-mcp:
    name: "GitHub MCP Integration"
    description: "Connect to GitHub for issues, PRs, and documentation sync"
    capabilities:
      - Create and update issues
      - Create pull requests
      - Push documentation
      - Comment on issues/PRs

  # Frontend Skills
  ux-frontend:
    name: "User Experience & Frontend"
    description: "UI/UX best practices, accessibility, responsive design"
    technologies:
      - React 19
      - Tailwind v4
      - shadcn/ui
      - Motion v12

  # Database Skills
  database:
    name: "Database Connection"
    description: "Query database objects, review schema, execute queries"
    capabilities:
      - Inspect PostgreSQL schema
      - Execute read queries
      - Review migrations
      - Analyze JSONB structures

  # Planning Skills
  implementation-plan:
    name: "Implementation Planning"
    description: "Generate detailed implementation plans from user stories"
    outputs:
      - Task breakdown
      - File modifications
      - Dependencies
      - Testing requirements

  # Testing Skills
  unit-test-backend:
    name: "Backend Unit Testing"
    description: "Python/pytest testing best practices"
    frameworks:
      - pytest
      - pytest-asyncio
      - pytest-httpx
      - pytest-postgresql

  unit-test-frontend:
    name: "Frontend Unit Testing"
    description: "React/Vitest testing best practices"
    frameworks:
      - Vitest
      - Testing Library
      - jest-axe
      - MSW

  # Document Audit Skills (used by Auditor)
  audit-brd:
    name: "BRD Audit"
    description: "Checklist-driven audit of Business Requirements Documents"
    location: ".github/prompts/skills/audit-brd/"

  audit-user-story:
    name: "User Story Audit"
    description: "INVEST + Gherkin checklist audit of User Stories"
    location: ".github/prompts/skills/audit-user-story/"

  audit-implementation-plan:
    name: "Implementation Plan Audit"
    description: "Blind-path detection and RF coverage audit of Implementation Plans"
    location: ".github/prompts/skills/audit-implementation-plan/"

  # Memory Protocol
  memory-protocol:
    name: "Memory Protocol"
    description: "Shared memory bank for all agents"
    mandatory: true
    location: ".github/memory-bank/"
    operations:
      - read_before_task
      - update_after_task

# =============================================================================
# WORKFLOW PHASES (F0-F6)
# =============================================================================
# Reference IDs for phases and steps:
#   Phase: F{n}     (e.g., F0, F1, F2...)
#   Step:  F{n}.S{m} (e.g., F1.S1, F1.S2...)
#
# Quick Reference Table:
# ┌────────┬──────────────┬────────────────┬──────────────────────────────────┐
# │ Phase  │ ID           │ Agent          │ Description                      │
# ├────────┼──────────────┼────────────────┼──────────────────────────────────┤
# │ IDLE   │ F0           │ -              │ Waiting for new requirement      │
# │ ANALYZE│ F1           │ BSA + Auditor  │ Requirements analysis + audit    │
# │ PLAN   │ F2           │ Orch + Auditor │ Implementation planning + audit  │
# │ IMPLEMENT│ F3         │ Coder          │ Code implementation              │
# │ REVIEW │ F4           │ Reviewer       │ Quality evaluation               │
# │ COMPLETE│ F5          │ -              │ Approved, finalize               │
# │ ESCALATE│ F6          │ -              │ Max iterations, manual review    │
# └────────┴──────────────┴────────────────┴──────────────────────────────────┘
#
# NOTE on internal audit sub-loops:
#   - F1 has an internal audit sub-loop (Auditor) with audit_iter_F1 (max 3).
#   - F2 has an internal audit sub-loop (Auditor) with audit_iter_F2 (max 3).
#   - These are NOT new phases — they iterate inside F1 / F2 until the audit
#     score is ≥ 9 or the per-phase cap is reached (then escalates to F6).
#   - The F3↔F4 review iteration (Reviewer, max 5) is independent.
#
# =============================================================================

phases:
  # ─────────────────────────────────────────────────────────────────────────────
  # F0: IDLE — Entry Point
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F0"
    name: "IDLE"
    description: "Waiting for new requirement"
    next: "F1"

  # ─────────────────────────────────────────────────────────────────────────────
  # F1: ANALYZE — BSA Agent + Auditor Agent (internal audit sub-loop)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F1"
    name: "ANALYZE"
    description: "BSA analyzing requirement, Auditor validating documents"
    agents:
      primary: "bsa"
      auditor: "auditor"
    steps:
      - id: "F1.S1"
        action: "read_memory_bank"
        agent: "bsa"
        description: "Read project context, knowledge index, and lessons learned"
      - id: "F1.S2"
        action: "analyze_requirement"
        agent: "bsa"
        description: "Parse and classify the incoming requirement"
      - id: "F1.S3"
        action: "generate_brd"
        agent: "bsa"
        description: "Create Business Requirements Document"
      - id: "F1.S4"
        action: "generate_user_stories"
        agent: "bsa"
        description: "Create user stories with acceptance criteria"
      - id: "F1.S5"
        action: "audit_documents"
        agent: "auditor"
        description: "Auditor validates BRD + User Stories. Skills: audit-brd, audit-user-story."
      - id: "F1.S6"
        action: "apply_audit_feedback"
        agent: "bsa"
        description: "Conditional. Triggered if audit_score < 9 AND audit_iter_F1 < 3. Loops back to F1.S3 / F1.S4 with feedback."
        conditional: true
      - id: "F1.S7"
        action: "sync_to_github"
        agent: "bsa"
        description: "Sync approved documentation to GitHub (if MCP available)"
      - id: "F1.S8"
        action: "update_memory_bank"
        agent: "bsa"
        description: "Update decisions history and knowledge index"
    internal_audit_loop:
      counter: "audit_iter_F1"
      max_iterations: 3
      minimum_passing_score: 9
      transitions:
        - condition: "audit_score >= 9"
          next_step: "F1.S7"
        - condition: "audit_score < 9 AND audit_iter_F1 < 3"
          next_step: "F1.S6"
          increment: "audit_iter_F1"
        - condition: "audit_score < 9 AND audit_iter_F1 >= 3"
          next_phase: "F6"
    next: "F2"

  # ─────────────────────────────────────────────────────────────────────────────
  # F2: PLAN — Orchestrator Agent + Auditor Agent (internal audit sub-loop)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F2"
    name: "PLAN"
    description: "Orchestrator creating implementation plan, Auditor validating it"
    agents:
      primary: "orchestrator"
      auditor: "auditor"
    steps:
      - id: "F2.S1"
        action: "read_memory_bank"
        agent: "orchestrator"
        description: "Read project context and generated BRD/stories"
      - id: "F2.S2"
        action: "create_implementation_plan"
        agent: "orchestrator"
        description: "Break down user stories into tasks with effort estimates"
      - id: "F2.S3"
        action: "audit_plan"
        agent: "auditor"
        description: "Auditor validates the Implementation Plan. Skill: audit-implementation-plan."
      - id: "F2.S4"
        action: "apply_audit_feedback"
        agent: "orchestrator"
        description: "Conditional. Triggered if audit_score < 9 AND audit_iter_F2 < 3. Loops back to F2.S2 with feedback."
        conditional: true
      - id: "F2.S5"
        action: "update_memory_bank"
        agent: "orchestrator"
        description: "Record planning decisions and update index"
    internal_audit_loop:
      counter: "audit_iter_F2"
      max_iterations: 3
      minimum_passing_score: 9
      transitions:
        - condition: "audit_score >= 9"
          next_step: "F2.S5"
        - condition: "audit_score < 9 AND audit_iter_F2 < 3"
          next_step: "F2.S4"
          increment: "audit_iter_F2"
        - condition: "audit_score < 9 AND audit_iter_F2 >= 3"
          next_phase: "F6"
    next: "F3"

  # ─────────────────────────────────────────────────────────────────────────────
  # F3: IMPLEMENT — Coder Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F3"
    name: "IMPLEMENT"
    description: "Coder implementing solution"
    agent: "coder"
    steps:
      - id: "F3.S1"
        action: "read_memory_bank"
        description: "Read implementation plan, architecture, and conventions"
      - id: "F3.S2"
        action: "implement_code"
        description: "Write production code following tech stack standards"
      - id: "F3.S3"
        action: "generate_unit_tests"
        description: "Create unit tests for backend and/or frontend"
      - id: "F3.S4"
        action: "update_memory_bank"
        description: "Record implementation decisions and created files"
    next: "F4"

  # ─────────────────────────────────────────────────────────────────────────────
  # F4: REVIEW — Reviewer Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F4"
    name: "REVIEW"
    description: "Reviewer evaluating code"
    agent: "reviewer"
    steps:
      - id: "F4.S1"
        action: "read_memory_bank"
        description: "Read implementation plan and acceptance criteria"
      - id: "F4.S2"
        action: "evaluate_code"
        description: "Review code against quality standards"
      - id: "F4.S3"
        action: "assign_score"
        description: "Calculate weighted score (1-10 scale)"
      - id: "F4.S4"
        action: "generate_review_report"
        description: "Create detailed review report with feedback"
      - id: "F4.S5"
        action: "update_memory_bank"
        description: "Record review decisions and lessons learned"
    next_conditions:
      - condition: "score >= 9"
        next: "F5"
      - condition: "score < 9 AND iteration < 5"
        next: "F3"
      - condition: "score < 9 AND iteration >= 5"
        next: "F6"

  # ─────────────────────────────────────────────────────────────────────────────
  # F5: COMPLETE — Terminal (Success)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F5"
    name: "COMPLETE"
    description: "Implementation approved"
    steps:
      - id: "F5.S1"
        action: "finalize_documentation"
        description: "Update all relevant documentation"
      - id: "F5.S2"
        action: "update_memory_bank"
        description: "Final update to decisions history"
      - id: "F5.S3"
        action: "notify_completion"
        description: "Notify user of successful completion"
    terminal: true

  # ─────────────────────────────────────────────────────────────────────────────
  # F6: ESCALATE — Terminal (Manual Review Required)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "F6"
    name: "ESCALATE"
    description: "Max iterations reached, manual review required"
    steps:
      - id: "F6.S1"
        action: "create_escalation_report"
        description: "Document all iteration attempts and blockers"
      - id: "F6.S2"
        action: "notify_manual_review"
        description: "Alert user that manual intervention is needed"
      - id: "F6.S3"
        action: "update_memory_bank"
        description: "Record escalation in lessons learned"
    terminal: true

# =============================================================================
# ITERATION CONTROL
# =============================================================================
iteration:
  # F3 <-> F4 code review loop (Reviewer)
  max_cycles: 5
  tracking:
    counter_variable: "iteration_count"
    reset_on: "new_requirement"

# Internal audit sub-loops (Auditor) — independent from the code review loop.
audit_iteration:
  max_cycles_per_phase: 3
  tracking:
    counters:
      - "audit_iter_F1"  # F1 ANALYZE — BRD + User Stories audit
      - "audit_iter_F2"  # F2 PLAN — Implementation Plan audit
    reset_on: "new_requirement"
  on_max_reached: "F6"  # Escalate to manual review

# =============================================================================
# MEMORY PROTOCOL
# =============================================================================
memory_protocol:
  mandatory_for_all_agents: true
  location: ".github/memory-bank/"
  structure:
    templates:
      - business-rules-template.md
      - decision-log-template.md
    indices:
      - knowledge-base-index.md
    logs:
      - lessons-learned.md
      - decisions-history.md
    conventions:
      - naming-conventions.md
    shared:
      - project-context.md
      - project-structure.md
      - architecture-summary.md
  operations:
    before_task:
      - read: "shared/project-context.md"
      - read: "indices/knowledge-base-index.md"
      - read: "logs/lessons-learned.md"
    after_task:
      - update: "logs/decisions-history.md"
      - update: "logs/lessons-learned.md"
      - update: "indices/knowledge-base-index.md"

# =============================================================================
# QUALITY GATES
# =============================================================================
quality_gates:
  review_score:
    minimum: 9
    scale: 10
  audit_score:
    minimum: 9
    scale: 10
    applies_to:
      - "F1: BRD + User Stories"
      - "F2: Implementation Plan"
  test_coverage:
    backend: 80%
    frontend: 80%
  documentation:
    required: true
    format: "markdown"
