# Deploy Backend to Hetzner VM
# Triggers on push to main branch (after PR merge)
# Last updated: 2026-05-26

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'alembic/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:  # Manual trigger

env:
  SSH_USER: novum
  DEPLOY_PATH: /home/novum/novum-backend

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-backend
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              ${{ env.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            
            echo "=== Navigating to project directory ==="
            cd /home/novum/novum-backend
            
            echo "=== Pulling latest changes ==="
            git fetch origin main
            git reset --hard origin/main
            
            echo "=== Installing dependencies ==="
            cd backend
            ~/.local/bin/uv sync
            
            echo "=== Loading environment variables ==="
            # Strip CRLF in case .env was edited from Windows
            sed -i 's/\r$//' .env
            set -a
            source .env
            set +a
            
            echo "=== Running database migrations ==="
            ~/.local/bin/uv run alembic upgrade head
            
            echo "=== Restarting service ==="
            sudo systemctl restart novum
            
            echo "=== Checking service status ==="
            sleep 2
            sudo systemctl is-active novum
            
            echo "=== Deploy complete ==="
          DEPLOY_SCRIPT

      - name: Health check
        run: |
          sleep 5
          response=$(curl -s -o /dev/null -w "%{http_code}" https://novum-prod.duckdns.org/health || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status: $response"
            exit 1
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
